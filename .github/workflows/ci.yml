name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    name: Rust tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wasm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm -> target
      - run: cargo test

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wasm
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: wasm -> target
      - run: cargo build --target wasm32-unknown-unknown --release
      - name: Verify WASM binary exists
        run: test -f target/wasm32-unknown-unknown/release/conch.wasm

  typst-smoke:
    name: Typst smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: typst-community/setup-typst@v5
      - run: typst compile demo/shell.typ demo/shell-ci.png --root .
      - run: rm -f demo/shell-ci.png
